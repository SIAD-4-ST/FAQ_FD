<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Assistant FAQ FD (Local)</title>

    * {

    }

    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(180deg, #ffffff 0%, #f7f3ec 100%);
      color: #1f2937;
      min-height: 100vh;
    }

    /* Barre noire du haut */
   .cc-topbar {
      width: 100%;
      height: 120px;
      background: #111815;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Logo civc */
    .cc-topbar-logo {
      height: 120px;
      display: block;
      margin-top: 32px;
    }

   .page {
      max-width: 980px;
      width: 100%;
      padding: 28px 18px 48px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 18px;
    }

    .header h1 {
      margin: 0;
      font-size: 1.9rem;
      font-weight: 800;
    }

    .header p {
      margin: 6px 0 0 0;
      color: #4b5563;
      font-size: 1rem;
    }

    .tabs {
      margin-top: 14px;
      display: inline-flex;
      gap: 8px;
      background: rgba(255,255,255,0.55);
      padding: 6px;
      border-radius: 999px;
      box-shadow: 0 5px 10px rgba(0,0,0,0.06);
    }

    /* Cadre blanc autour barre de recherche */
    .card {
      background: white;
      padding: 25px 20px;
      margin-top: 25px;
      border-radius: 14px;
      border: 1px solid #f5f3ef;
      box-shadow: 0 10px 10px rgba(0,0,0,0.06);
    }

    .search-block { text-align: center; }

    .search-label {
      font-weight: 700;
      display: block;
      margin-bottom: 10px;
    }

    .search-row {
      display: flex;
      gap: 8px;
      justify-content: center;
    }

    #questionInput {
      flex: 1;
      max-width: 520px;
      padding: 10px 18px;
      border-radius: 999px;
      border: 1px solid #d1d5db;
      font-size: 1rem;
    }

    /* Bouton Rechercher */
    .btn-primary {
      background: #c8af82;
      color: #ffffff;
      border: none;
      border-radius: 999px;
      padding: 10px 25px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 700;
      white-space: nowrap;
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .helper-text {
      margin-top: 10px;
      font-size: 0.95rem;
      color: #6b7280;
    }

    .themes {
      margin-top: 25px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* Boutons Thèmes de recherche */
    .theme-btn {
      background: #c8af82;
      border: 1px solid #c8af82;
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 700;
      font-size: 0.95rem;
      color: #ffffff;
    }

    .theme-btn:hover {
      box-shadow: 0 3px 10px rgba(0,0,0,0.08);
    }

    .theme-btn.active {
      background: #ffffff;
      color: #c8af82;
      border-color: #f3ede2;
    }

    .theme-title {
      font-weight: 800;
      margin: 30px 0 12px;
      font-size: 1.05rem;
    }

    .qa-item {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      margin: 10px 0;
      overflow: hidden;
    }

    .qa-q {
      width: 100%;
      text-align: left;
      padding: 12px 14px;
      background: #f9fafb;
      border: none;
      cursor: pointer;
      font-weight: 800;
      font-size: 0.95rem;
    }

    .qa-q:hover { background: #f3f4f6; }

    .qa-a {
      display: none;
      padding: 12px 14px;
      background: white;
      border-top: 1px solid #e5e7eb;
      white-space: pre-wrap;
      line-height: 1.5;
    }

    .qa-item.open .qa-a { display: block; }

    .message {
      font-size: 0.95rem;
      margin-top: 10px;
    }
    .message.error { color: #b91c1c; }
    .message.info {
      color: #b91c1c;
      font-weight: 700;
      font-size: 1rem;
    }

    .answer-title {
      font-weight: 700;
      font-size: 1.1rem;
      margin-bottom: 10px;
    }

    .answer-question-label {
      color: #6b7280;
      font-size: 0.9rem;
      margin-bottom: 4px;
    }

    .answer-question {
      font-size: 1rem;
      margin-bottom: 10px;
    }

    .answer-body {
      white-space: pre-wrap;
      font-size: 1rem;
      line-height: 1.5;
      margin-bottom: 10px;
    }

    .alternatives-section {
      margin-top: 16px;
      border-top: 1px solid #e5e7eb;
      padding-top: 10px;
    }

    .alternatives-title {
      font-weight: 700;
      margin-bottom: 6px;
    }

    #alternativesList {
      padding-left: 18px;
      margin: 0;
    }

    .alternative-item {
      padding: 6px 0;
      border-bottom: 1px solid #e5e7eb;
      cursor: pointer;
      font-size: 0.95rem;
      color: #2563eb;
      list-style: disc;
    }

    .alternative-question { text-decoration: underline; }

    .alternative-meta {
      color: #9ca3af;
      font-size: 0.8rem;
      margin-left: 6px;
    }

  </style>
</head>

<body>
  <header class="cc-topbar">

    <!--        RECHERCHE      -->
    <!-- ===================== -->
    <section id="tab-search" class="tabpane active">

      <section class="card search-block">
        <label for="questionInput" class="search-label">Posez votre question :</label>

        <div class="search-row">
          <input
            id="questionInput"
            type="text"
            placeholder="Exemple : La prospection est-elle obligatoire ?"
          />
          <button id="searchButton" class="btn-primary">Rechercher</button>
        </div>

        <div class="helper-text">
          Appuyez sur <strong>Entrée</strong> ou cliquez sur <strong>Rechercher</strong>.
        </div>

        <div id="searchMessage" class="message info"></div>
      </section>

      <!-- CARTE 2 : Catégories -->
      <section class="card search-block">
        <div class="search-label">Ou sélectionnez une catégorie :</div>

        <div class="themes">
          <button class="theme-btn" data-theme="infos">Connaissances et Formation</button>
          <button class="theme-btn" data-theme="prospection">Prospection</button>
          <button class="theme-btn" data-theme="lutte">Lutte</button>
          <button class="theme-btn" data-theme="arrachage">Prélèvements et Arrachage</button>
          <button class="theme-btn" data-theme="certification">Certification</button>
        </div>

        <section id="themeResults" class="theme-results" style="display:none;">
          <div id="themeTitle" class="theme-title"></div>
          <div id="themeList"></div>
        </section>
      </section>

      <section class="card" id="resultsCard" style="display:none;">
        <div class="answer-title">Résultats de recherche</div>

        <div class="answer-question-label">Question :</div>
        <div id="answerQuestion" class="answer-question"></div>

        <div class="answer-question-label">Réponse :</div>
        <div id="answerBody" class="answer-body"></div>

        <div id="alternativesSection" class="alternatives-section" style="display:none;">
          <div class="alternatives-title">Autres questions proches</div>
          <ul id="alternativesList"></ul>
        </div>
      </section>

    </section>

  </div>

        .map(ensureCounters)
        .filter(it => getCategory(it).includes(key))
        .sort((a, b) => (a.id || 0) - (b.id || 0));
    }

    function renderTheme(categoryKey) {
      const items = getFaqItemsByCategory(categoryKey);
      const label = CATEGORY_LABELS[categoryKey] || categoryKey;

      themeResults.style.display = "block";
      themeTitle.textContent = `${label} (${items.length})`;
      themeList.innerHTML = "";

      if (items.length === 0) {
        themeList.innerHTML = `<div class="message info">Aucune question dans cette catégorie.</div>`;
        return;
      }

      items.forEach((item) => {
        const card = document.createElement("div");
        card.className = "qa-item";

        const qBtn = document.createElement("button");
        qBtn.className = "qa-q";
        qBtn.type = "button";
        qBtn.textContent = item.question;

        const aDiv = document.createElement("div");
        aDiv.className = "qa-a";
        aDiv.innerHTML = (item.reponse || "").replace(/\n/g, "<br>");

        qBtn.addEventListener("click", () => {

          const wasOpen = card.classList.contains("open");

          // Fermer toutes les réponses ouvertes
          document.querySelectorAll("#themeList .qa-item.open")
            .forEach(el => el.classList.remove("open"));

          // Si on reclique sur la même → elle reste fermée
          if (wasOpen) return;

          // Sinon on ouvre celle-ci
          card.classList.add("open");

          // Compter la vue
          if (!card.dataset.viewCounted) {
            incrementViewCount(item.id);
            card.dataset.viewCounted = "1";

          }
        });

        card.appendChild(qBtn);
        card.appendChild(aDiv);
        themeList.appendChild(card);
      });
    }

    function levenshtein(a, b) {
      const m = [];
      for (let i = 0; i <= b.length; i++) m[i] = [i];
      for (let j = 0; j <= a.length; j++) m[0][j] = j;

      for (let i = 1; i <= b.length; i++) {
        for (let j = 1; j <= a.length; j++) {
          m[i][j] = Math.min(
            m[i - 1][j] + 1,
            m[i][j - 1] + 1,
            m[i - 1][j - 1] + (a[j - 1] === b[i - 1] ? 0 : 1)
          );
        }
      }
      return m[b.length][a.length];
    }

    function normalizeBaseTerm(term) {
      let t = term;
      if (t.endsWith('s') && t.length > 3) t = t.slice(0, -1);
      if (DIRECT_CORRECTIONS[t]) return DIRECT_CORRECTIONS[t];

      let best = t;
      let bestDist = Infinity;
      for (const word of VOCABULARY) {
        const d = levenshtein(t, word);
        if (d < bestDist) { bestDist = d; best = word; }
      }
      return bestDist <= 2 ? best : t;
    }

    function expandSynonyms(term) {
      const extras = SYNONYMS[term] || [];
      return [term, ...extras];
    }

    function tokenize(text) {
      if (!text) return [];

      const normalized = text
        .toLowerCase()
        .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
        .replace(/[^a-z0-9 ]/g, ' ');

      const rawTokens = normalized
        .split(/\s+/)
        .filter(t => t.length >= 2 && !STOPWORDS.has(t));

      const tokens = [];
      rawTokens.forEach((t) => {
        const base = normalizeBaseTerm(t);
        const expanded = expandSynonyms(base);
        expanded.forEach((tok) => {
          if (tok.length >= 2 && !STOPWORDS.has(tok)) tokens.push(tok);
        });
      });
      return tokens;
    }

    let indexDocs = [];
    let idf = new Map();

    function loadFaqWrapper() {
      const raw = localStorage.getItem(LS_KEYS.FAQ_WRAPPER);
      if (!raw) return structuredClone(DEFAULT_FAQ_WRAPPER);
      try {
        const obj = JSON.parse(raw);
        if (!obj || !Array.isArray(obj.faq)) return structuredClone(DEFAULT_FAQ_WRAPPER);
        return obj;
      } catch {
        return structuredClone(DEFAULT_FAQ_WRAPPER);
      }
    }

    function saveFaqWrapper(wrapper) {
      localStorage.setItem(LS_KEYS.FAQ_WRAPPER, JSON.stringify(wrapper, null, 2));
    }

    function ensureCounters(item) {
      item.nb_vues = item.nb_vues || 0;
      item.nb_oui = item.nb_oui || 0;
      item.nb_non = item.nb_non || 0;
      if (!Array.isArray(item.tags)) item.tags = [];
      if (!Array.isArray(item.variantes)) item.variantes = [];
      if (!Array.isArray(item.category)) item.category = [];
      return item;
    }

    function buildIndexFromFaq(faqItems) {
      const docsTokens = [];

      faqItems.forEach((item) => {
        const mainTokens = tokenize(item.question || '');
        if (mainTokens.length > 0) docsTokens.push({ id: item.id, tokens: mainTokens });

        if (Array.isArray(item.variantes)) {
          item.variantes.forEach((variantText) => {
            const variantTokens = tokenize(variantText || '');
            if (variantTokens.length > 0) docsTokens.push({ id: item.id, tokens: variantTokens });
          });
        }
        const tagTokens = tokenize((item.tags || []).join(' '));
        if (tagTokens.length > 0) docsTokens.push({ id: item.id, tokens: tagTokens });
      });

      const df = new Map();
      const N = docsTokens.length;

      docsTokens.forEach((doc) => {
        const uniqueTerms = new Set(doc.tokens);
        uniqueTerms.forEach((term) => df.set(term, (df.get(term) || 0) + 1));
      });

      idf = new Map();
      df.forEach((dfCount, term) => {
        const idfValue = Math.log((N + 1) / (dfCount + 1)) + 1;
        idf.set(term, idfValue);
      });

      indexDocs = docsTokens.map((doc) => {
        const tfCounts = new Map();
        doc.tokens.forEach((t) => tfCounts.set(t, (tfCounts.get(t) || 0) + 1));

        const len = doc.tokens.length || 1;
        const weights = new Map();
        let normSq = 0;

        tfCounts.forEach((count, term) => {
          const tf = count / len;
          const idfValue = idf.get(term) || 0;
          const w = tf * idfValue;
          if (w > 0) {
            weights.set(term, w);
            normSq += w * w;
          }
        });

        const norm = Math.sqrt(normSq) || 1;
        return { id: doc.id, weights, norm };
      });
    }

    function buildQueryVector(queryTokens) {
      const tfCounts = new Map();
      queryTokens.forEach((t) => tfCounts.set(t, (tfCounts.get(t) || 0) + 1));

      const len = queryTokens.length || 1;
      const qWeights = new Map();
      let normSq = 0;

      tfCounts.forEach((count, term) => {
        const idfValue = idf.get(term);
        if (!idfValue) return;

        const tf = count / len;
        const w = tf * idfValue;
        if (w > 0) {
          qWeights.set(term, w);
          normSq += w * w;
        }
      });

      const norm = Math.sqrt(normSq);
      return { weights: qWeights, norm };
    }

    function cosineSimilarity(queryWeights, queryNorm, doc) {
      if (!queryNorm || !doc.norm) return 0;
      let dot = 0;
      queryWeights.forEach((wq, term) => {
        const wd = doc.weights.get(term);
        if (wd) dot += wq * wd;
      });
      if (dot <= 0) return 0;
      return dot / (queryNorm * doc.norm);
    }

    function computeUtilityScore(item) {
      const oui = item.nb_oui || 0;
      const non = item.nb_non || 0;
      const totalAvis = oui + non;
      if (totalAvis < 3) return 0.5;
      return oui / totalAvis;
    }

    function searchFAQ(userQuery, topK = 5) {
      const queryTokens = tokenize(userQuery);
      if (queryTokens.length === 0) return [];

      const { weights: qWeights, norm: qNorm } = buildQueryVector(queryTokens);
      if (!qNorm || qWeights.size === 0) return [];

      const wrapper = loadFaqWrapper();
      const faqItems = wrapper.faq.map(ensureCounters);
      const faqById = new Map(faqItems.map((item) => [item.id, item]));

      const scoresById = new Map();
      indexDocs.forEach((doc) => {
        const cosine = cosineSimilarity(qWeights, qNorm, doc);
        if (cosine <= 0) return;
        const current = scoresById.get(doc.id);
        if (!current || cosine > current.cosine) scoresById.set(doc.id, { cosine });
      });

      const results = [];
      scoresById.forEach((value, id) => {
        const item = faqById.get(id);
        if (!item) return;

        const cosine = value.cosine;
        const utility = computeUtilityScore(item);
        const finalScore = ALPHA * cosine + BETA * utility;

        results.push({
          ...structuredClone(item),
          similarity: Number(cosine.toFixed(4)),
          utility: Number(utility.toFixed(2)),
          score: Number(finalScore.toFixed(4))
        });
      });

      results.sort((a, b) => b.score - a.score);
      return results.filter((r) => r.score >= MIN_SCORE).slice(0, topK);
    }

    function apiSearch({ question, limit }) {
      if (!question) return { error: 'Le champ "question" est requis.' };
      const topK = typeof limit === 'number' && limit > 0 ? limit : 5;

      const results = searchFAQ(question, topK);
      if (!results || results.length === 0) {
        return {
          message: "Je n'ai pas trouvé de réponse suffisamment pertinente.",
          bestAnswer: null,
          alternatives: []
        };
      }

      const [best, ...others] = results;

      incrementViewCount(best.id);
      const wrapper = loadFaqWrapper();
      const updated = wrapper.faq.find(x => x.id === best.id);
      if (updated) best.nb_vues = updated.nb_vues;

      return { message: "", bestAnswer: best, alternatives: others };
    }

    function incrementViewCount(id) {
      const qid = Number(id);
      const wrapper = loadFaqWrapper();
      const item = wrapper.faq.find(q => Number(q.id) === qid);
      if (!item) return null;

      ensureCounters(item);
      item.nb_vues += 1;
      saveFaqWrapper(wrapper);
      return structuredClone(item);
    }

    const questionInput = document.getElementById("questionInput");
    const searchButton = document.getElementById("searchButton");
    const searchMessage = document.getElementById("searchMessage");

    const resultsCard = document.getElementById("resultsCard");
    const answerQuestion = document.getElementById("answerQuestion");
    const answerBody = document.getElementById("answerBody");

    const alternativesSection = document.getElementById("alternativesSection");
    const alternativesList = document.getElementById("alternativesList");

    let currentAnswer = null;

    (function init() {
      const wrapper = loadFaqWrapper();
      wrapper.faq = wrapper.faq.map(ensureCounters);
      saveFaqWrapper(wrapper);

      buildIndexFromFaq(wrapper.faq);
      initTabs();

      searchButton.addEventListener("click", sendSearch);
      questionInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") { e.preventDefault(); sendSearch(); }
      });

      questionInput.addEventListener("input", () => {
      // Dès qu'on retape quelque chose : on déverrouille
       if (lockedQuery) {
      lockedQuery = null;
      questionInput.placeholder = DEFAULT_PLACEHOLDER;
      }
      // On réactive le bouton si l'utilisateur a saisi du texte
      searchButton.disabled = questionInput.value.trim().length === 0;
      });

      document.querySelectorAll(".theme-btn").forEach((btn) => {
        btn.addEventListener("click", () => {

          const theme = btn.dataset.theme;
          const isAlreadyActive = btn.classList.contains("active");

          // Si on reclique sur la catégorie active → on ferme tout
          if (isAlreadyActive) {
            hideThemeResults();
            return;
          }

          // Sinon : on change de catégorie
          document.querySelectorAll(".theme-btn")
            .forEach(b => b.classList.remove("active"));

          btn.classList.add("active");

          hideSearchResults();   // mode exclusif
          renderTheme(theme);
        });
      });
      searchButton.disabled = questionInput.value.trim().length === 0;
    })();

    function initTabs() {
      // Plus d’onglets dans la version minimale.
    }

    function setLoading(isLoading) {
      searchButton.textContent = isLoading ? "Recherche en cours…" : "Rechercher";

      if (isLoading) {
        searchButton.disabled = true;
        return;
      }

      // Quand on finit de charger, on réapplique la logique normale :
      // - désactivé si champ vide
      // - désactivé si une recherche est "verrouillée" (placeholder = question précédente)
      searchButton.disabled =
        questionInput.value.trim().length === 0 || !!lockedQuery;
    }

    function displayAnswer(answer) {
      if (!answer) return;

      currentAnswer = answer;
      resultsCard.style.display = "block";

      answerQuestion.textContent = answer.question;
      answerBody.innerHTML = (answer.reponse || "").replace(/\n/g, "<br>");

    }

    function displayAlternatives(alts) {
      if (!alts || alts.length === 0) {
        alternativesSection.style.display = "none";
        return;
      }

      alternativesSection.style.display = "block";
      alternativesList.innerHTML = "";

      alts.forEach((alt) => {
        const li = document.createElement("li");
        li.className = "alternative-item";

        const q = document.createElement("span");
        q.className = "alternative-question";
        q.textContent = alt.question;

        const meta = document.createElement("span");
        meta.className = "alternative-meta";
        let metaText = "";
        if (typeof alt.score === "number") metaText += `score ${alt.score}`;
        meta.textContent = metaText ? `(${metaText})` : "";

        li.appendChild(q);
        if (metaText) li.appendChild(meta);

        li.onclick = () => {
          // compter la vue de l'alternative
          const updated = incrementViewCount(alt.id);

          // mettre à jour l'objet affiché (au moins nb_vues)
          if (updated && typeof updated.nb_vues === "number") alt.nb_vues = updated.nb_vues;
          if (updated && typeof updated.nb_oui === "number") alt.nb_oui = updated.nb_oui;
          if (updated && typeof updated.nb_non === "number") alt.nb_non = updated.nb_non;

          displayAnswer(alt);
        };
        alternativesList.appendChild(li);
      });
    }

    function hideThemeResults() {
      themeResults.style.display = "none";
      themeTitle.textContent = "";
      themeList.innerHTML = "";
      document.querySelectorAll(".theme-btn")
        .forEach(b => b.classList.remove("active"));
    }

    function hideSearchResults() {
      resultsCard.style.display = "none";
      searchMessage.textContent = "";
      currentAnswer = null;
    }

    function sendSearch() {
      const question = questionInput.value.trim();
      hideThemeResults();
      if (lockedQuery && question === lockedQuery) return;
      if (!question) {
        searchMessage.textContent = "Veuillez saisir une question.";
        searchMessage.className = "message error";
        return;
      }

      // On "garde" la question en placeholder (gris) et on verrouille
      lockedQuery = question;
      questionInput.value = "";
      questionInput.placeholder = question;

      // On empêche de relancer la question tant qu'une nouvelle saisie n'a pas été faite
      searchButton.disabled = true;

      setLoading(true);
      searchMessage.textContent = "";
      searchMessage.className = "message info";

      try {
        const data = apiSearch({ question });

        if (data.error) {
          searchMessage.textContent = data.error;
          searchMessage.className = "message error";
          resultsCard.style.display = "none";
          return;
        }

        if (!data.bestAnswer) {
          resultsCard.style.display = "none";
          searchMessage.textContent = data.message;
          return;
        }

        displayAnswer(data.bestAnswer);
        displayAlternatives(data.alternatives);

        searchMessage.textContent = data.message;
      } catch (err) {
        searchMessage.textContent = "Une erreur est survenue.";
        searchMessage.className = "message error";
      } finally {
        setLoading(false);
      }
    }

  </script>
</body>
</html>
